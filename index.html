<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Portal Website</title>
  <style>
    /* ==================== GLOBAL STYLES ==================== */
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #FFA500;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
    }

    a.button {
      background-color: #FFA500;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      display: inline-block;
      margin: 10px;
    }

    a.button:hover {
      background-color: #ff7b00;
    }

    /* ==================== SIDEBAR ==================== */
    #sidebar {
      position: fixed;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      background-color: #111;
      border-radius: 0 8px 8px 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
      transition: width 0.3s;
      width: 50px; /* collapsed width */
      overflow: hidden;
    }

    #sidebar.expanded {
      width: 200px; /* expanded width */
    }

    .sidebar-btn {
      background-color: #FFA500;
      border: none;
      color: #000;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      transition: background-color 0.3s;
      white-space: nowrap;
    }

    .sidebar-btn:hover {
      background-color: #ff7b00;
    }

    .sidebar-btn span {
      display: none;
    }

    #sidebar.expanded .sidebar-btn span {
      display: inline;
    }

    #toggleBtn {
      background-color: #FFA500;
      border: none;
      color: #000;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      #sidebar {
        top: auto;
        bottom: 10px;
        left: 10px;
        transform: none;
        flex-direction: row;
        width: auto;
        border-radius: 8px;
        padding: 5px;
      }

      #sidebar.expanded {
        width: auto;
      }

      .sidebar-btn {
        font-size: 0.9rem;
        padding: 8px;
      }

      .sidebar-btn span {
        display: none;
      }
    }
  </style>
</head>
<body>

  <h1>Official Portal Website for _noGabrielChristensen</h1>
  <p>Come back often to see what's new!</p>

  <!-- Main Portal Button -->
  <a href="#" class="button">Enter Portal</a>

  <!-- Floating Sidebar -->
  <div id="sidebar">
    <button class="sidebar-btn" onclick="window.location='#'">
      🏠<span> Home</span>
    </button>
    <button class="sidebar-btn" onclick="window.open('https://www.twitch.tv/xBleedvow?sr=a', '_blank')">
      🎮<span> Twitch</span>
    </button>
    <button class="sidebar-btn" onclick="alert('Other Feature Coming Soon!')">
      ⚡<span> Feature</span>
    </button>
    <button id="toggleBtn">☰</button>
  </div>

  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleBtn');

    // Load saved state from localStorage
    if (localStorage.getItem('sidebarExpanded') === 'true') {
      sidebar.classList.add('expanded');
    }

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('expanded');
      // Save the current state
      localStorage.setItem('sidebarExpanded', sidebar.classList.contains('expanded'));
    });
  </script>

</body>
</html>
