<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Portal Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="collapsed">
    <!-- Main Portal Icon -->
    <div class="sidebar-icon" data-link="index.html" title="Enter Portal">
      🌀
    </div>
    <!-- Twitch Icon -->
    <div class="sidebar-icon" data-link="https://www.twitch.tv/xBleedvow?sr=a" title="Twitch" onclick="window.open(this.dataset.link, '_blank')">
      🎮
    </div>
    <!-- Future Feature Placeholders -->
    <div class="feature-placeholder" title="Future Feature 1">⚡</div>
    <div class="feature-placeholder" title="Future Feature 2">💎</div>
    <div class="feature-placeholder" title="Future Feature 3">🔥</div>
    <!-- Collapse/Expand Control -->
    <div class="sidebar-icon" id="toggleSidebar" title="Expand/Collapse Sidebar">
      ⇆
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Official Portal Website for _noGabrielChristensen</h1>
    <p>Come back often to see what's new!</p>
    <a href="index.html" class="button">Enter Portal</a>
    <a href="https://www.twitch.tv/xBleedvow?sr=a" target="_blank" class="button">
      🎮 I'm Live on Twitch — Come Hang Out!
    </a>
  </div>

  <!-- Sidebar Script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Handle clicks for sidebar icons with data-link
    document.querySelectorAll('.sidebar-icon[data-link]').forEach(icon => {
      icon.addEventListener('click', () => {
        const link = icon.dataset.link;
        if(link.startsWith('http')) {
          window.open(link, '_blank');
        } else {
          window.location.href = link;
        }
      });
    });
  </script>
</body>
</html>
