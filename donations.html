<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donations — Official Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="collapsed">
    <div class="sidebar-icon" data-link="index.html" title="Home">🏠</div>
    <div class="sidebar-icon" data-link="https://www.twitch.tv/xBleedvow?sr=a" title="Twitch" onclick="window.open(this.dataset.link, '_blank')">🎮</div>
    <!-- Future Feature Placeholders -->
    <div class="feature-placeholder" title="Feature 1">⚡</div>
    <div class="feature-placeholder" title="Feature 2">💎</div>
    <div class="feature-placeholder" title="Feature 3">🔥</div>
    <div class="sidebar-icon" id="toggleSidebar" title="Expand/Collapse Sidebar">⇆</div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Support the Portal</h1>
    <p>Your support helps us maintain and expand the portal with new features and updates. Thank you for helping keep this space active and growing.</p>

    <!-- Donation Options -->
    <div class="notes-section">
      <ul>
        <li><strong>Cash App:</strong> <button class="button" onclick="window.open('https://cash.app/$YourCashtag', '_blank')">Donate via Cash App</button></li>
        <li><strong>PayPal:</strong> <button class="button" onclick="window.open('https://www.paypal.com/donate?hosted_button_id=YOURID', '_blank')">Donate via PayPal</button></li>
        <li><strong>Crypto:</strong> Bitcoin, Ethereum, or other crypto options coming soon.</li>
      </ul>
    </div>

    <a href="index.html" class="button">Back to Home</a>
  </div>

  <!-- Sidebar Script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    document.querySelectorAll('.sidebar-icon[data-link]').forEach(icon => {
      icon.addEventListener('click', () => {
        const link = icon.dataset.link;
        if(link.startsWith('http')) {
          window.open(link, '_blank');
        } else {
          window.location.href = link;
        }
      });
    });
  </script>
</body>
</html>
