<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Official Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #player-container {
      margin-top: 20px;
      text-align: center;
    }

    #audio {
      width: 100%;
      max-width: 400px;
      margin-bottom: 15px;
    }

    #fileInput {
      margin-bottom: 10px;
    }

    #playlist {
      margin-top: 10px;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    #customization, #donationSection, #progressSection {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #222;
      border-radius: 8px;
      max-width: 700px;
      text-align: left;
    }

    #customization label {
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="collapsed">
    <div class="sidebar-icon" data-link="index.html" title="Home">🏠</div>
    <div class="sidebar-icon" data-link="https://www.twitch.tv/xBleedvow?sr=a" title="Twitch" onclick="window.open(this.dataset.link, '_blank')">🎮</div>
    <!-- Future Feature Placeholders -->
    <div class="feature-placeholder" title="Feature 1">⚡</div>
    <div class="feature-placeholder" title="Feature 2">💎</div>
    <div class="feature-placeholder" title="Feature 3">🔥</div>
    <div class="sidebar-icon" id="toggleSidebar" title="Expand/Collapse Sidebar">⇆</div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Admin Panel</h1>

    <!-- Music Player -->
    <div id="player-container">
      <audio id="audio" controls></audio>
      <input type="file" id="fileInput" accept="audio/*" multiple>
      <div id="playlist"></div>
    </div>

    <!-- Customization Panel -->
    <div id="customization">
      <h2>Customization</h2>
      <label>
        Background Color:
        <input type="color" id="bgColor" value="#000000">
      </label>
      <label>
        Bar Width:
        <input type="range" id="barWidth" min="1" max="10" value="4">
      </label>
      <label>
        Sensitivity:
        <input type="range" id="sensitivity" min="10" max="256" value="64">
      </label>
    </div>

    <!-- Donation Section -->
    <div id="donationSection">
      <h2>Donation Settings</h2>
      <p>Click below to donate via Cash App.</p>
      <button id="donateButton" class="button"
              onclick="window.open('https://cash.app/$YourCashtag', '_blank')">
        Donate Now
      </button>
    </div>

    <!-- What's in Progress -->
    <div id="progressSection">
      <h2>What’s in Progress</h2>
      <ul>
        <li>Donation button integration with Cash App prepared.</li>
        <li>Message box for submitting requests coming soon.</li>
      </ul>
    </div>

    <a href="index.html" class="button">Back to Home</a>
  </div>

  <!-- Sidebar Script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Handle sidebar icon clicks
    document.querySelectorAll('.sidebar-icon[data-link]').forEach(icon => {
      icon.addEventListener('click', () => {
        const link = icon.dataset.link;
        if(link.startsWith('http')) {
          window.open(link, '_blank');
        } else {
          window.location.href = link;
        }
      });
    });

    // Audio Player Logic
    const audio = document.getElementById("audio");
    const fileInput = document.getElementById("fileInput");
    const playlist = document.getElementById("playlist");

    fileInput.addEventListener("change", () => {
      playlist.innerHTML = "";
      Array.from(fileInput.files).forEach((file, index) => {
        const item = document.createElement("div");
        item.textContent = file.name;
        item.classList.add("playlist-item");
        item.onclick = () => loadTrack(file);
        playlist.appendChild(item);
        if(index === 0) loadTrack(file);
      });
    });

    function loadTrack(file) {
      const url = URL.createObjectURL(file);
      audio.src = url;
      audio.play();
    }
  </script>
</body>
</html>
