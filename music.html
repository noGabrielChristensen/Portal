<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music — Official Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #player {
      margin-top: 20px;
      width: 90%;
      max-width: 700px;
      text-align: center;
    }
    audio {
      width: 100%;
      margin-top: 10px;
      margin-bottom: 20px;
    }
    #playlist {
      text-align: left;
      margin-top: 10px;
    }
    #playlist div {
      cursor: pointer;
      padding: 5px;
      border-bottom: 1px solid #222;
      transition: background 0.2s;
    }
    #playlist div:hover {
      background-color: #222;
      color: #ff7b00;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="collapsed">
    <div class="sidebar-icon" data-link="index.html" title="Home">🏠</div>
    <div class="sidebar-icon" data-link="https://www.twitch.tv/xBleedvow?sr=a" title="Twitch" onclick="window.open(this.dataset.link, '_blank')">🎮</div>
    <!-- Future Feature Placeholders -->
    <div class="feature-placeholder" title="Feature 1">⚡</div>
    <div class="feature-placeholder" title="Feature 2">💎</div>
    <div class="feature-placeholder" title="Feature 3">🔥</div>
    <div class="sidebar-icon" id="toggleSidebar" title="Expand/Collapse Sidebar">⇆</div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Music Portal</h1>
    <p>Listen to uploaded tracks and manage your music playlist below. Upload new audio files to play immediately.</p>

    <div id="player">
      <audio id="audio" controls></audio>
      <input type="file" id="fileInput" accept="audio/*" multiple>
      <div id="playlist"></div>
    </div>

    <a href="index.html" class="button">Back to Home</a>
  </div>

  <!-- Sidebar Script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    document.querySelectorAll('.sidebar-icon[data-link]').forEach(icon => {
      icon.addEventListener('click', () => {
        const link = icon.dataset.link;
        if(link.startsWith('http')) {
          window.open(link, '_blank');
        } else {
          window.location.href = link;
        }
      });
    });

    // Music Player Script
    const audio = document.getElementById("audio");
    const fileInput = document.getElementById("fileInput");
    const playlist = document.getElementById("playlist");

    fileInput.addEventListener("change", () => {
      playlist.innerHTML = "";
      Array.from(fileInput.files).forEach((file, index) => {
        const item = document.createElement("div");
        item.textContent = file.name;
        item.onclick = () => loadTrack(file);
        playlist.appendChild(item);
        if(index === 0) loadTrack(file);
      });
    });

    function loadTrack(file) {
      const url = URL.createObjectURL(file);
      audio.src = url;
      audio.play();
    }
  </script>
</body>
</html>
