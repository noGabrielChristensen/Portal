<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music — Official Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #player {
      margin-top: 20px;
      text-align: center;
    }
    #audio {
      width: 100%;
      max-width: 400px;
    }
    #visualizer {
      width: 100%;
      max-width: 700px;
      height: 150px;
      margin-top: 20px;
      background-color: #000;
      border-radius: 8px;
    }
    #fileInput {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="collapsed">
    <div class="sidebar-icon" data-link="index.html" title="Home">🏠</div>
    <div class="sidebar-icon" data-link="https://www.twitch.tv/xBleedvow?sr=a" title="Twitch" onclick="window.open(this.dataset.link, '_blank')">🎮</div>
    <!-- Future Feature Placeholders -->
    <div class="feature-placeholder" title="Feature 1">⚡</div>
    <div class="feature-placeholder" title="Feature 2">💎</div>
    <div class="feature-placeholder" title="Feature 3">🔥</div>
    <div class="sidebar-icon" id="toggleSidebar" title="Expand/Collapse Sidebar">⇆</div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Music Player</h1>
    <p>Upload your audio files to listen and see the visualization.</p>

    <div id="player">
      <audio id="audio" controls></audio>
      <input type="file" id="fileInput" accept="audio/*" multiple>
      <div id="playlist"></div>
    </div>

    <canvas id="visualizer"></canvas>

    <a href="index.html" class="button">Back to Home</a>
  </div>

  <!-- Sidebar & Music Script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');
    const audio = document.getElementById('audio');
    const fileInput = document.getElementById('fileInput');
    const playlist = document.getElementById('playlist');
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');

    let audioCtx, analyser, source, dataArray;
    const smoothedValues = [];
    let beatLevel = 0;
    let rotationAngle = 0;
    let hueOffset = 0;
    const sparkles = [];

    // Resize canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth * 0.9;
      canvas.height = 150;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Sidebar toggle
    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });
    document.querySelectorAll('.sidebar-icon[data-link]').forEach(icon => {
      icon.addEventListener('click', () => {
        const link = icon.dataset.link;
        if(link.startsWith('http')) window.open(link, '_blank');
        else window.location.href = link;
      });
    });

    // Load audio files
    fileInput.addEventListener("change", () => {
      playlist.innerHTML = "";
      Array.from(fileInput.files).forEach((file, index) => {
        const item = document.createElement("div");
        item.textContent = file.name;
        item.classList.add("playlist-item");
        item.onclick = () => loadTrack(file);
        playlist.appendChild(item);
        if (index === 0) loadTrack(file);
      });
    });

    function loadTrack(file) {
      const url = URL.createObjectURL(file);
      audio.src = url;
      audio.play();
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 512;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        for (let i = 0; i < analyser.frequencyBinCount; i++) smoothedValues[i] = 0;
      }
    }

    function draw() {
      requestAnimationFrame(draw);
      if (!analyser) return;

      analyser.getByteFrequencyData(dataArray);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const widthScale = canvas.width / 700;
      const heightScale = canvas.height / 150;

      for (let i = 0; i < dataArray.length; i++) {
        smoothedValues[i] += (dataArray[i] - smoothedValues[i]) * 0.1;
      }

      let bassSum = 0;
      const bassCount = Math.floor(dataArray.length / 10);
      for (let i = 0; i < bassCount; i++) bassSum += smoothedValues[i];
      beatLevel = bassSum / bassCount / 255;

      rotationAngle += 0.01 + beatLevel * 0.05;
      hueOffset += 1 + beatLevel * 3;

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const baseRadius = (80 + beatLevel * 100) * heightScale;
      const totalBars = 60;

      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotationAngle);

      for (let i = 0; i < totalBars; i++) {
        const bassIndex = Math.floor(i * 2);
        const hiHatIndex = dataArray.length - totalBars + i;
        const value = (smoothedValues[bassIndex] + smoothedValues[hiHatIndex]) / 2;
        const barLength = value * heightScale * 2;
        const angle = (i / totalBars) * 2 * Math.PI;
        const hue = (hueOffset + value) % 360;

        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.fillStyle;

        ctx.rotate(angle);
        ctx.fillRect(baseRadius, -2, barLength, 4);
        ctx.rotate(-angle);
      }
      ctx.restore();
    }

    draw();
  </script>
</body>
</html>
