<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music & Media — Official Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Main Content Styling */
    #main-content {
      padding: 40px;
      max-width: 900px;
      margin-left: 80px; /* space for sidebar */
      color: #FFA500;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .button {
      background-color: #FFA500;
      color: #000000;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin: 10px 5px 0 0;
      transition: transform 0.2s, background-color 0.3s;
    }

    .button:hover {
      background-color: #ff7b00;
      transform: scale(1.05);
    }

    #player-section {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 12px;
      background-color: #111;
    }

    audio {
      width: 100%;
      margin-top: 10px;
      outline: none;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    #playlist {
      margin-top: 20px;
    }

    #playlist div {
      margin-bottom: 8px;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #playlist div:hover {
      background-color: #222;
      color: #ff7b00;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="collapsed">
    <div class="sidebar-icon" data-link="index.html" title="Home">🏠</div>
    <div class="sidebar-icon" data-link="https://www.twitch.tv/xBleedvow?sr=a" title="Twitch">🎮</div>

    <!-- Future Feature Placeholders -->
    <div class="feature-placeholder" title="Feature 1">⚡</div>
    <div class="feature-placeholder" title="Feature 2">💎</div>
    <div class="feature-placeholder" title="Feature 3">🔥</div>

    <div class="sidebar-icon" id="toggleSidebar" title="Expand/Collapse Sidebar">⇆</div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Music & Media</h1>
    <p>Upload your audio tracks to test in the portal or explore existing media content below.</p>

    <div id="player-section">
      <input type="file" id="fileInput" accept="audio/*" multiple>
      <audio id="audio" controls></audio>
      <div id="playlist"></div>
    </div>

    <br>
    <a href="index.html" class="button">Back to Home</a>
  </div>

  <!-- Sidebar Script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Sidebar icon clicks
    document.querySelectorAll('.sidebar-icon[data-link]').forEach(icon => {
      icon.addEventListener('click', () => {
        const link = icon.dataset.link;
        if(link.startsWith('http')) {
          window.open(link, '_blank');
        } else {
          window.location.href = link;
        }
      });
    });

    // Audio player functionality
    const fileInput = document.getElementById('fileInput');
    const audio = document.getElementById('audio');
    const playlist = document.getElementById('playlist');

    fileInput.addEventListener('change', () => {
      playlist.innerHTML = '';
      Array.from(fileInput.files).forEach((file, index) => {
        const item = document.createElement('div');
        item.textContent = file.name;
        item.onclick = () => {
          audio.src = URL.createObjectURL(file);
          audio.play();
        };
        playlist.appendChild(item);

        // Automatically play first track
        if(index === 0) {
          audio.src = URL.createObjectURL(file);
          audio.play();
        }
      });
    });
  </script>
</body>
</html>
